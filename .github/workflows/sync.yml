name: Sync dbt Fusion versions

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all existing tags
        run: git fetch --tags

      - name: Sync versions from dbt-fusion CHANGELOG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSIONS=$(.github/scripts/parse-versions.sh)
          echo "Versions found: $(echo "$VERSIONS" | tr '\n' ' ')"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CREATED=0
          for VERSION in $VERSIONS; do
            if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q .; then
              echo "  $VERSION — already exists"
            else
              echo "  $VERSION — creating tag"
              git tag "$VERSION"
              git push origin "$VERSION"
              CREATED=$((CREATED + 1))
            fi
          done

          echo "Done — $CREATED new tag(s) created"
